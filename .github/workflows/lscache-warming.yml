name: LSCache Warming

on:
  schedule:
    - cron: '30 0,4,11 * * *'
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 5022 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Activer flag warming_in_progress
        run: |
          ssh -p 5022 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "~/www/vendor/drush/drush/drush state:set warming_in_progress 1 && \
             ~/www/vendor/drush/drush/drush state:set warming_started_at \$(date +%s)"

      - name: LSCache warm
        shell: bash
        run: |

          set +e

          URL_COUNT=0
          HIT_COUNT=0
          MISS_COUNT=0
          NOCACHE_COUNT=0
          ERROR_COUNT=0

          PAGE=1

          DOMAIN="https://www.senlutteurs.com"

          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0.0.0 Safari/537.36"

          normalize_url() {
            local u="$1"

            u=$(echo "$u" | sed -E 's#^http://#https://#')
            u=$(echo "$u" | sed -E 's#^https://senlutteurs\.com#https://www.senlutteurs.com#')
            u=$(echo "$u" | sed -E 's/#.*$//')

            echo "$u"
          }

          request_headers() {
            local url="$1"

            curl -s \
              -D - \
              -o /dev/null \
              --compressed \
              --http2 \
              --max-time 20 \
              -A "$UA" \
              "$url" 2>/dev/null
          }

          extract_header() {
            local headers="$1"
            local name="$2"

            echo "$headers" \
              | grep -i "^$name:" \
              | tail -1 \
              | cut -d: -f2- \
              | tr -d '\r' \
              | xargs
          }

          while true; do

            URLS=$(curl -s "${DOMAIN}/sitemap.xml?page=${PAGE}" \
              | grep -oE '<loc>[^<]+</loc>' \
              | sed -e 's#<loc>##' -e 's#</loc>##' \
              | grep -v 'sitemap\.xml')

            if [ -z "$URLS" ]; then
              echo ""
              echo "===== FIN SITEMAP PAGE ${PAGE} ====="
              break
            fi

            echo ""
            echo "===== SITEMAP PAGE ${PAGE} ====="

            while read -r RAW_URL; do

              [ -z "$RAW_URL" ] && continue

              URL_COUNT=$((URL_COUNT + 1))

              URL=$(normalize_url "$RAW_URL")

              echo ""
              echo "[$URL_COUNT] $URL"

              ##########################################################
              # WARM REQUEST
              ##########################################################

              HEADERS1=$(request_headers "$URL")

              if [ -z "$HEADERS1" ]; then
                echo "    [ERROR]"
                ERROR_COUNT=$((ERROR_COUNT + 1))
                sleep 1
                continue
              fi

              HTTP_CODE=$(echo "$HEADERS1" \
                | grep -oP '^HTTP/\S+\s+\K\d+' \
                | tail -1)

              CACHE_CONTROL=$(extract_header "$HEADERS1" "x-litespeed-cache-control")

              if echo "$CACHE_CONTROL" \
                | grep -qiE 'private|no-cache|no-store'; then

                echo "    [NO CACHE]"
                NOCACHE_COUNT=$((NOCACHE_COUNT + 1))

                sleep 0.5
                continue
              fi

              ##########################################################
              # VERIFY HIT
              ##########################################################

              sleep 0.5

              HEADERS2=$(request_headers "$URL")

              CACHE_STATUS=$(extract_header "$HEADERS2" "x-litespeed-cache")

              if echo "$CACHE_STATUS" | grep -qi '^hit'; then

                echo "    [HIT ✓]"
                HIT_COUNT=$((HIT_COUNT + 1))

              else

                echo "    [MISS ✗] (${CACHE_STATUS:-none})"
                MISS_COUNT=$((MISS_COUNT + 1))
              fi

              ##########################################################
              # SERVER LOAD PROTECTION
              ##########################################################

              if [ "$HTTP_CODE" = "429" ] || [ "$HTTP_CODE" = "503" ]; then

                echo "    [SERVER LOAD] sleeping 15s"
                sleep 15

              else

                sleep 0.5
              fi

            done <<< "$URLS"

            echo ""
            echo "===== PAGE ${PAGE} DONE ====="
            echo "TOTAL    : $URL_COUNT"
            echo "HIT      : $HIT_COUNT"
            echo "MISS     : $MISS_COUNT"
            echo "NO CACHE : $NOCACHE_COUNT"
            echo "ERRORS   : $ERROR_COUNT"

            PAGE=$((PAGE + 1))

            sleep 3

          done

          echo ""
          echo "=================================================="
          echo "FINAL REPORT"
          echo "=================================================="
          echo "TOTAL URLS : $URL_COUNT"
          echo "HIT        : $HIT_COUNT"
          echo "MISS       : $MISS_COUNT"
          echo "NO CACHE   : $NOCACHE_COUNT"
          echo "ERRORS     : $ERROR_COUNT"
          echo "=================================================="

      - name: Désactiver flag warming_in_progress
        if: always()
        run: |
          ssh -p 5022 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "~/www/vendor/drush/drush/drush state:delete warming_in_progress"
